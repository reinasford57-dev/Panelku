<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Welper ID</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #0f0f1a; color: #fff; }
        .login-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); max-width: 400px; margin: auto; }
        input { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); color: #fff; }
        input:focus { outline: none; border-color: #8b5cf6; }
        .btn-primary { background: linear-gradient(135deg, #6366f1, #8b5cf6); transition: all 0.3s; }
        .btn-primary:hover { transform: scale(1.02); }
        #loginError { color: #ef4444; font-size: 13px; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="login-card w-full rounded-2xl p-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold bg-gradient-to-r from-indigo-500 to-purple-500 bg-clip-text text-transparent">
                Welper ID
            </h1>
            <p class="text-gray-400 text-sm mt-1">Masuk untuk mengakses toko & dashboard</p>
        </div>

        <form id="loginForm">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-400 mb-1">Username</label>
                <input type="text" id="username" required class="w-full rounded-xl px-4 py-2.5" placeholder="admin / owner / reseller" />
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-400 mb-1">Password</label>
                <input type="password" id="password" required class="w-full rounded-xl px-4 py-2.5" placeholder="••••••••" />
            </div>
            <div id="loginError" class="hidden mb-3"></div>
            <button type="submit" class="btn-primary w-full text-white py-2.5 rounded-xl font-bold text-sm">
                Login
            </button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const errorDiv = document.getElementById('loginError');

    try {
        const res = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login gagal');

        // Tunggu 500ms agar session benar-benar tersimpan
        await new Promise(resolve => setTimeout(resolve, 500));
        window.location.href = '/';
    } catch (err) {
        errorDiv.textContent = err.message || 'Username atau password salah.';
        errorDiv.classList.remove('hidden');
    }
});
    </script>
</body>
</html>
