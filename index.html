<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <title>Welper ID - Auto Order Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0f0f1a; color: #fff; }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100%;
            background: #0a0a0f;
            border-right: 1px solid rgba(255,255,255,0.05);
            z-index: 100;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 25px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }

        .user-avatar-large {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 28px;
            cursor: pointer;
        }

        .user-name-sidebar {
            font-weight: 600;
            margin-bottom: 4px;
            cursor: pointer;
        }

        .user-email-sidebar {
            font-size: 11px;
            color: #a1a1aa;
        }

        .sidebar-header h2 {
            margin-top: 15px;
            font-size: 18px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-menu {
            padding: 20px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            border-radius: 12px;
            color: #a1a1aa;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 5px;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(99,102,241,0.1);
            color: #8b5cf6;
        }

        .nav-item i {
            width: 20px;
            font-size: 18px;
        }

        /* Main Content */
        .main-content {
            margin-left: 280px;
            padding: 20px;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 25px;
        }

        .page-title {
            font-size: 24px;
            font-weight: 600;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255,255,255,0.05);
            padding: 8px 16px 8px 12px;
            border-radius: 50px;
        }

        .user-avatar {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .user-name-header {
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        .logout-header {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 14px;
        }

        /* Search Bar */
        .search-bar {
            margin-bottom: 25px;
        }

        .search-input {
            width: 100%;
            padding: 14px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            color: #fff;
            font-size: 14px;
        }

        .search-input:focus {
            outline: none;
            border-color: #8b5cf6;
        }

        /* Categories */
        .categories {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .category-btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            color: #fff;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
        }

        .category-btn.active {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-color: transparent;
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .product-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: rgba(139,92,246,0.5);
            box-shadow: 0 20px 25px -12px rgba(0,0,0,0.3);
        }

        .product-icon {
            width: 50px;
            height: 50px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 15px;
        }

        .product-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .product-desc {
            font-size: 11px;
            color: #a1a1aa;
            margin-bottom: 15px;
        }

        .product-price {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 15px;
        }

        .current-price {
            font-size: 20px;
            font-weight: 700;
            color: #8b5cf6;
        }

        .original-price {
            font-size: 13px;
            color: #52525b;
            text-decoration: line-through;
        }

        .discount-badge {
            background: #ef4444;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
        }

        .product-stock {
            font-size: 11px;
            color: #10b981;
            margin-bottom: 15px;
        }

        .buy-btn {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .buy-btn:hover {
            transform: scale(1.02);
        }

        /* Cart Sidebar */
        .cart-sidebar {
            position: fixed;
            right: -400px;
            top: 0;
            width: 400px;
            height: 100%;
            background: #0a0a0f;
            border-left: 1px solid rgba(255,255,255,0.05);
            z-index: 200;
            transition: right 0.3s;
            display: flex;
            flex-direction: column;
        }

        .cart-sidebar.open {
            right: 0;
        }

        .cart-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .cart-item {
            display: flex;
            gap: 12px;
            padding: 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-name {
            font-size: 14px;
            font-weight: 500;
        }

        .cart-item-price {
            font-size: 12px;
            color: #8b5cf6;
        }

        .cart-item-remove {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
        }

        .cart-footer {
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 18px;
            font-weight: 600;
        }

        .checkout-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
        }

        .cart-icon {
            position: relative;
            cursor: pointer;
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ef4444;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 199;
            display: none;
        }

        .overlay.open {
            display: block;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 30px;
            background: #10b981;
            color: white;
            font-size: 13px;
            z-index: 1000;
            display: none;
        }

        /* Profile Modal */
        .profile-modal {
            position: fixed;
            inset: 0;
            z-index: 300;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
        }

        .profile-modal.open {
            display: flex;
        }

        .profile-card {
            background: #0a0a0f;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            max-width: 400px;
            width: 100%;
            padding: 30px 24px;
            position: relative;
        }

        .profile-card .close-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: none;
            color: #a1a1aa;
            font-size: 20px;
            cursor: pointer;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 32px;
        }

        .profile-name {
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .profile-email {
            text-align: center;
            font-size: 14px;
            color: #a1a1aa;
            margin-bottom: 16px;
        }

        .profile-rank {
            text-align: center;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .profile-rank .badge {
            display: inline-block;
            padding: 4px 16px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 13px;
        }

        .badge-member { background: rgba(99,102,241,0.15); color: #8b5cf6; }
        .badge-premium { background: rgba(245,158,11,0.15); color: #f59e0b; }
        .badge-reseller { background: rgba(236,72,153,0.15); color: #ec4899; }
        .badge-admin { background: rgba(239,68,68,0.15); color: #ef4444; }
        .badge-owner { background: rgba(16,185,129,0.15); color: #10b981; }

        .upgrade-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 600;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s;
        }

        .upgrade-btn:hover {
            transform: scale(1.02);
        }

        .dashboard-link {
            display: inline-block;
            margin-top: 12px;
            color: #8b5cf6;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
        }

        .dashboard-link:hover {
            color: #6366f1;
        }

        @media (max-width: 768px) {
            .sidebar {
                left: -280px;
            }
            .main-content {
                margin-left: 0;
            }
            .cart-sidebar {
                width: 100%;
                right: -100%;
            }
            .sidebar.open {
                left: 0;
            }
        }
    </style>
</head>
<body>

<!-- ========== SIDEBAR ========== -->
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="user-avatar-large" id="sidebarAvatar" onclick="openProfile()">
            <i class="fas fa-user"></i>
        </div>
        <div class="user-name-sidebar" id="sidebarUserName" onclick="openProfile()">Loading...</div>
        <div class="user-email-sidebar" id="sidebarUserEmail">-</div>
        <h2><i class="fas fa-bolt"></i> Welper ID</h2>
    </div>
    <div class="nav-menu">
        <div class="nav-item active" data-page="products">
            <i class="fas fa-store"></i>
            <span>Produk</span>
        </div>
        <div class="nav-item" data-page="profile" onclick="openProfile()">
            <i class="fas fa-user"></i>
            <span>Profile</span>
        </div>
        <div id="dashboardNavItem" class="nav-item hidden" data-page="dashboard">
            <i class="fas fa-tachometer-alt"></i>
            <span>Dashboard</span>
        </div>
    </div>
</div>

<!-- ========== MAIN CONTENT ========== -->
<div class="main-content">
    <div class="top-bar">
        <div class="page-title">Welper Store</div>
        <div style="display: flex; gap: 15px; align-items: center;">
            <div class="cart-icon" id="cartIcon">
                <i class="fas fa-shopping-cart" style="font-size: 22px;"></i>
                <span class="cart-count" id="cartCount">0</span>
            </div>
            <div class="user-info">
                <div class="user-avatar" onclick="openProfile()">
                    <i class="fas fa-user"></i>
                </div>
                <span class="user-name-header" id="headerUserName" onclick="openProfile()">Guest</span>
                <button class="logout-header" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Search -->
    <div class="search-bar">
        <input type="text" class="search-input" id="searchInput" placeholder="Cari produk..." />
    </div>

    <!-- Categories -->
    <div class="categories" id="categories"></div>

    <!-- Products Grid -->
    <div class="products-grid" id="productsGrid"></div>
</div>

<!-- ========== CART SIDEBAR ========== -->
<div class="overlay" id="cartOverlay"></div>
<div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
        <h3><i class="fas fa-shopping-cart"></i> Keranjang</h3>
        <button id="closeCartBtn" style="background:none; border:none; color:#fff; font-size:20px; cursor:pointer;">✖</button>
    </div>
    <div class="cart-items" id="cartItems">
        <div style="text-align: center; color: #52525b;">Keranjang kosong</div>
    </div>
    <div class="cart-footer">
        <div class="cart-total">
            <span>Total:</span>
            <span id="cartTotal">Rp 0</span>
        </div>
        <button class="checkout-btn" id="checkoutBtn">
            <i class="fas fa-credit-card"></i> Checkout
        </button>
    </div>
</div>

<!-- ========== PROFILE MODAL ========== -->
<div class="profile-modal" id="profileModal">
    <div class="profile-card">
        <button class="close-btn" onclick="closeProfile()">&times;</button>
        <div class="profile-avatar">
            <i class="fas fa-user"></i>
        </div>
        <div class="profile-name" id="profileName">Loading...</div>
        <div class="profile-email" id="profileEmail">-</div>
        <div class="profile-rank" id="profileRank">
            <span class="badge badge-member">Member</span>
        </div>
        <a href="https://t.me/owner_welper" target="_blank" class="upgrade-btn">
            <i class="fab fa-telegram-plane"></i> Upgrade Pangkat via Telegram
        </a>
        <div id="profileDashboardLink" class="text-center mt-2 hidden">
            <a href="dashboard.html" class="dashboard-link">
                <i class="fas fa-tachometer-alt"></i> Buka Dashboard
            </a>
        </div>
    </div>
</div>

<!-- ========== TOAST ========== -->
<div id="toast" class="toast"></div>

<script>
    // Firebase Config (sesuaikan dengan proyek kamu)
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_AUTH_DOMAIN",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_STORAGE_BUCKET",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Produk data (contoh - lengkap bisa disesuaikan)
    const PRODUCTS = {
        telegram: {
            category: "Telegram Premium",
            icon: "fab fa-telegram",
            color: "#0088cc",
            products: [
                { id: "tg_1m", name: "Telegram Premium 1 Bulan", price: 35000, stock: 999, description: "Akses premium 30 hari" }
            ]
        },
        apps: {
            category: "Aplikasi Premium",
            icon: "fas fa-mobile-alt",
            color: "#10b981",
            products: [
                { id: "spotify_1m", name: "Spotify Premium 1 Bulan", price: 25000, stock: 500, description: "Spotify Premium individual" }
            ]
        },
        games: {
            category: "Game Premium",
            icon: "fas fa-gamepad",
            color: "#f59e0b",
            products: [
                { id: "ml_100", name: "MLBB 100 Diamond", price: 15000, stock: 999, description: "100 Diamond Mobile Legends" }
            ]
        },
        social: {
            category: "Social Media",
            icon: "fas fa-share-alt",
            color: "#3b82f6",
            products: [
                { id: "ig_followers_1k", name: "IG Followers 1000", price: 25000, stock: 999, description: "1000 Followers IG" }
            ]
        },
        hosting: {
            category: "VPS & Hosting",
            icon: "fas fa-server",
            color: "#8b5cf6",
            products: [
                { id: "vps_1gb", name: "VPS 1GB RAM", price: 50000, stock: 100, description: "1 vCPU, 1GB RAM, 20GB SSD" }
            ]
        },
        tools: {
            category: "Tools & Software",
            icon: "fas fa-tools",
            color: "#ef4444",
            products: [
                { id: "win11_pro", name: "Windows 11 Pro", price: 175000, stock: 999, description: "Windows 11 Pro License" }
            ]
        },
        courses: {
            category: "Courses",
            icon: "fas fa-graduation-cap",
            color: "#06b6d4",
            products: [
                { id: "course_web", name: "Web Developer Bootcamp", price: 250000, stock: 100, description: "Full Stack Web Dev" }
            ]
        },
        others: {
            category: "Lainnya",
            icon: "fas fa-ellipsis-h",
            color: "#6b7280",
            products: [
                { id: "pulsa_50k", name: "Pulsa Rp 50.000", price: 52000, stock: 999, description: "All Operator" }
            ]
        }
    };

    const CATEGORIES = [
        { id: "all", name: "Semua", icon: "fas fa-th-large" },
        { id: "telegram", name: "Telegram Premium", icon: "fab fa-telegram" },
        { id: "apps", name: "Aplikasi", icon: "fas fa-mobile-alt" },
        { id: "games", name: "Game", icon: "fas fa-gamepad" },
        { id: "social", name: "Social Media", icon: "fas fa-share-alt" },
        { id: "hosting", name: "VPS & Hosting", icon: "fas fa-server" },
        { id: "tools", name: "Tools", icon: "fas fa-tools" },
        { id: "courses", name: "Courses", icon: "fas fa-graduation-cap" },
        { id: "others", name: "Lainnya", icon: "fas fa-ellipsis-h" }
    ];

    class WelperStore {
        constructor() {
            this.currentUser = null;
            this.cart = [];
            this.currentCategory = "all";
            this.searchQuery = "";
            this.init();
        }

        async init() {
            this.checkAuth();
            this.loadCart();
            this.renderCategories();
            this.renderProducts();
            this.setupEventListeners();
        }

        checkAuth() {
            auth.onAuthStateChanged((user) => {
                if (!user) {
                    window.location.href = 'login.html';
                    return;
                }
                this.currentUser = user;
                this.updateUserUI();
                this.updateDashboardLink();
                this.updateProfileRank();
            });
        }

        updateUserUI() {
            const displayName = this.currentUser.displayName || this.currentUser.email.split('@')[0];
            document.getElementById('sidebarUserName').innerText = displayName;
            document.getElementById('sidebarUserEmail').innerText = this.currentUser.email;
            document.getElementById('headerUserName').innerText = displayName;
        }

        updateDashboardLink() {
            // Tentukan role berdasarkan email (atau custom claims)
            const email = this.currentUser.email;
            const isAdmin = email === 'admin@example.com';
            const isOwner = email === 'owner@example.com';
            const isReseller = email === 'reseller@example.com';

            const dashboardNav = document.getElementById('dashboardNavItem');
            const profileDashboardLink = document.getElementById('profileDashboardLink');

            if (isAdmin || isOwner || isReseller) {
                dashboardNav.classList.remove('hidden');
                profileDashboardLink.classList.remove('hidden');
                // Tambahkan event listener untuk dashboard nav
                dashboardNav.addEventListener('click', () => {
                    window.location.href = 'dashboard.html';
                });
            } else {
                dashboardNav.classList.add('hidden');
                profileDashboardLink.classList.add('hidden');
            }
        }

        updateProfileRank() {
            const email = this.currentUser.email;
            let rank = 'Member';
            let badgeClass = 'badge-member';

            if (email === 'admin@example.com') { rank = 'Admin'; badgeClass = 'badge-admin'; }
            else if (email === 'owner@example.com') { rank = 'Owner'; badgeClass = 'badge-owner'; }
            else if (email === 'reseller@example.com') { rank = 'Reseller'; badgeClass = 'badge-reseller'; }
            else if (email.includes('premium')) { rank = 'Premium'; badgeClass = 'badge-premium'; }

            document.getElementById('profileName').innerText = this.currentUser.displayName || this.currentUser.email.split('@')[0];
            document.getElementById('profileEmail').innerText = this.currentUser.email;
            document.getElementById('profileRank').innerHTML = `<span class="badge ${badgeClass}">${rank}</span>`;
        }

        loadCart() {
            const saved = localStorage.getItem('cart');
            if (saved) this.cart = JSON.parse(saved);
            this.updateCartUI();
        }

        saveCart() {
            localStorage.setItem('cart', JSON.stringify(this.cart));
            this.updateCartUI();
        }

        updateCartUI() {
            const count = this.cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartCount').innerText = count;

            const cartItemsDiv = document.getElementById('cartItems');
            if (this.cart.length === 0) {
                cartItemsDiv.innerHTML = '<div style="text-align:center; color:#52525b;">Keranjang kosong</div>';
            } else {
                cartItemsDiv.innerHTML = this.cart.map(item => `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-price">Rp ${item.price.toLocaleString()}</div>
                            <div style="font-size:11px; color:#52525b;">x${item.quantity}</div>
                        </div>
                        <button class="cart-item-remove" data-id="${item.id}">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                `).join('');

                document.querySelectorAll('.cart-item-remove').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const id = btn.getAttribute('data-id');
                        this.removeFromCart(id);
                    });
                });
            }

            const total = this.cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            document.getElementById('cartTotal').innerText = `Rp ${total.toLocaleString()}`;
        }

        addToCart(product) {
            const existing = this.cart.find(item => item.id === product.id);
            if (existing) {
                existing.quantity++;
            } else {
                this.cart.push({
                    id: product.id,
                    name: product.name,
                    price: product.price,
                    quantity: 1
                });
            }
            this.saveCart();
            this.showToast(`${product.name} ditambahkan ke keranjang!`, 'success');
        }

        removeFromCart(id) {
            this.cart = this.cart.filter(item => item.id !== id);
            this.saveCart();
            this.showToast('Produk dihapus dari keranjang', 'info');
        }

        renderCategories() {
            const container = document.getElementById('categories');
            container.innerHTML = CATEGORIES.map(cat => `
                <button class="category-btn ${this.currentCategory === cat.id ? 'active' : ''}" data-category="${cat.id}">
                    <i class="${cat.icon}"></i> ${cat.name}
                </button>
            `).join('');

            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    this.currentCategory = btn.getAttribute('data-category');
                    this.renderCategories();
                    this.renderProducts();
                });
            });
        }

        renderProducts() {
            let allProducts = [];
            for (const cat in PRODUCTS) {
                allProducts = [...allProducts, ...PRODUCTS[cat].products.map(p => ({
                    ...p,
                    category: cat,
                    categoryName: PRODUCTS[cat].category,
                    categoryColor: PRODUCTS[cat].color,
                    categoryIcon: PRODUCTS[cat].icon
                }))];
            }

            if (this.currentCategory !== 'all') {
                allProducts = allProducts.filter(p => p.category === this.currentCategory);
            }

            if (this.searchQuery) {
                const query = this.searchQuery.toLowerCase();
                allProducts = allProducts.filter(p => 
                    p.name.toLowerCase().includes(query) || 
                    p.description.toLowerCase().includes(query)
                );
            }

            const container = document.getElementById('productsGrid');
            if (allProducts.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:50px; color:#52525b;">Produk tidak ditemukan</div>';
                return;
            }

            container.innerHTML = allProducts.map(p => `
                <div class="product-card">
                    <div class="product-icon" style="background: ${p.categoryColor}20; color: ${p.categoryColor}">
                        <i class="${p.categoryIcon}"></i>
                    </div>
                    <div class="product-name">${p.name}</div>
                    <div class="product-desc">${p.description}</div>
                    <div class="product-price">
                        <span class="current-price">Rp ${p.price.toLocaleString()}</span>
                    </div>
                    <div class="product-stock"><i class="fas fa-check-circle"></i> Stok: ${p.stock}</div>
                    <button class="buy-btn" data-id="${p.id}" data-name="${p.name}" data-price="${p.price}">
                        <i class="fas fa-shopping-cart"></i> Beli
                    </button>
                </div>
            `).join('');

            document.querySelectorAll('.buy-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = btn.getAttribute('data-id');
                    const name = btn.getAttribute('data-name');
                    const price = parseInt(btn.getAttribute('data-price'));
                    this.addToCart({ id, name, price });
                });
            });
        }

        setupEventListeners() {
            document.getElementById('searchInput').addEventListener('input', (e) => {
                this.searchQuery = e.target.value;
                this.renderProducts();
            });

            document.getElementById('cartIcon').addEventListener('click', () => {
                document.getElementById('cartSidebar').classList.add('open');
                document.getElementById('cartOverlay').classList.add('open');
            });

            document.getElementById('closeCartBtn').addEventListener('click', () => {
                document.getElementById('cartSidebar').classList.remove('open');
                document.getElementById('cartOverlay').classList.remove('open');
            });

            document.getElementById('cartOverlay').addEventListener('click', () => {
                document.getElementById('cartSidebar').classList.remove('open');
                document.getElementById('cartOverlay').classList.remove('open');
            });

            document.getElementById('checkoutBtn').addEventListener('click', () => this.checkout());
            document.getElementById('logoutBtn').addEventListener('click', () => {
                auth.signOut().then(() => {
                    window.location.href = 'login.html';
                });
            });
        }

        checkout() {
            if (this.cart.length === 0) {
                this.showToast('Keranjang kosong!', 'error');
                return;
            }
            const total = this.cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            this.showToast(`Pesanan berhasil! Total: Rp ${total.toLocaleString()}`, 'success');
            this.cart = [];
            this.saveCart();
            document.getElementById('cartSidebar').classList.remove('open');
            document.getElementById('cartOverlay').classList.remove('open');
        }

        showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.style.background = type === 'error' ? '#ef4444' : (type === 'success' ? '#10b981' : '#6366f1');
            toast.innerText = message;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }
    }

    // --- Profile Functions ---
    function openProfile() {
        document.getElementById('profileModal').classList.add('open');
    }

    function closeProfile() {
        document.getElementById('profileModal').classList.remove('open');
    }

    // --- Init Store ---
    new WelperStore();
</script>
</body>
</html>
