<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Auto Order Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0f0f1a; color: #fff; }
        .sidebar { position: fixed; left: 0; top: 0; width: 280px; height: 100%; background: #0a0a0f; border-right: 1px solid rgba(255,255,255,0.05); z-index: 100; overflow-y: auto; }
        .sidebar-header { padding: 25px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .user-avatar-large { width: 70px; height: 70px; background: linear-gradient(135deg, #6366f1, #8b5cf6); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; font-size: 28px; }
        .user-name-sidebar { font-weight: 600; }
        .user-email-sidebar { font-size: 11px; color: #a1a1aa; }
        .sidebar-header h2 { margin-top: 15px; font-size: 18px; background: linear-gradient(135deg, #6366f1, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-menu { padding: 20px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 15px; border-radius: 12px; color: #a1a1aa; cursor: pointer; transition: all 0.3s; margin-bottom: 5px; }
        .nav-item:hover, .nav-item.active { background: rgba(99,102,241,0.1); color: #8b5cf6; }
        .main-content { margin-left: 280px; padding: 20px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 25px; }
        .page-title { font-size: 24px; font-weight: 600; }
        .user-info { display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.05); padding: 8px 16px 8px 12px; border-radius: 50px; }
        .user-avatar { width: 38px; height: 38px; background: linear-gradient(135deg, #6366f1, #8b5cf6); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .logout-header { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 14px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .stat-title { font-size: 13px; color: #a1a1aa; margin-bottom: 8px; }
        .stat-value { font-size: 32px; font-weight: 700; color: #8b5cf6; }
        .form-card { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 25px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 25px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 13px; color: #a1a1aa; margin-bottom: 8px; }
        .input-group input, .input-group select, .input-group textarea { width: 100%; padding: 12px 15px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; font-size: 14px; }
        .input-group input:focus, .input-group select:focus { outline: none; border-color: #8b5cf6; }
        .btn { padding: 12px 24px; background: linear-gradient(135deg, #6366f1, #8b5cf6); border: none; border-radius: 12px; color: #fff; font-weight: 600; cursor: pointer; }
        .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { color: #a1a1aa; font-weight: 500; font-size: 12px; }
        .status { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }
        .status-pending { background: rgba(245,158,11,0.2); color: #f59e0b; }
        .status-processing { background: rgba(59,130,246,0.2); color: #3b82f6; }
        .status-completed { background: rgba(16,185,129,0.2); color: #10b981; }
        @media (max-width: 768px) { .sidebar { left: -280px; } .main-content { margin-left: 0; } .sidebar.open { left: 0; } }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="user-avatar-large" id="sidebarAvatar"><i class="fas fa-user"></i></div>
        <div class="user-name-sidebar" id="sidebarUserName">Loading...</div>
        <div class="user-email-sidebar" id="sidebarUserEmail">-</div>
        <h2><i class="fas fa-bolt"></i> AutoOrder</h2>
    </div>
    <div class="nav-menu">
        <div class="nav-item active" data-page="dashboard"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></div>
        <div class="nav-item" data-page="order"><i class="fas fa-shopping-cart"></i><span>Buat Order</span></div>
        <div class="nav-item" data-page="orders"><i class="fas fa-list"></i><span>Daftar Order</span></div>
        <div class="nav-item" data-page="products"><i class="fas fa-box"></i><span>Produk</span></div>
        <div class="nav-item" data-page="settings"><i class="fas fa-cog"></i><span>Settings</span></div>
    </div>
</div>

<div class="main-content">
    <div class="top-bar">
        <div class="page-title" id="pageTitle">Dashboard</div>
        <div class="user-info">
            <div class="user-avatar"><i class="fas fa-user"></i></div>
            <span class="user-name-header" id="headerUserName">Admin</span>
            <button class="logout-header" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboardPage">
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-title">Total Order Hari Ini</div><div class="stat-value" id="totalOrders">0</div></div>
            <div class="stat-card"><div class="stat-title">Pending</div><div class="stat-value" id="pendingOrders">0</div></div>
            <div class="stat-card"><div class="stat-title">Completed</div><div class="stat-value" id="completedOrders">0</div></div>
            <div class="stat-card"><div class="stat-title">Revenue (Hari Ini)</div><div class="stat-value" id="todayRevenue">Rp 0</div></div>
        </div>
        <div class="form-card"><div class="form-title"><i class="fas fa-chart-line"></i><span>Recent Orders</span></div><div class="orders-table" id="recentOrders"></div></div>
    </div>

    <!-- Buat Order -->
    <div id="orderPage" style="display:none;">
        <div class="form-card">
            <div class="form-title"><i class="fas fa-shopping-cart"></i><span>Buat Order Baru</span></div>
            <div class="input-group"><label>Pilih Produk</label><select id="productSelect"><option value="">-- Pilih Produk --</option></select></div>
            <div class="input-group"><label>Target ID / Username</label><input type="text" id="targetId" placeholder="Masukkan ID atau username target"></div>
            <div class="input-group"><label>Email Penerima</label><input type="email" id="customerEmail" placeholder="customer@example.com"></div>
            <div class="input-group"><label>Catatan (Optional)</label><textarea id="orderNote" rows="3" placeholder="Catatan tambahan..."></textarea></div>
            <div class="input-group"><label>Metode Pembayaran</label><select id="paymentMethod"><option value="qris">QRIS</option><option value="dana">DANA</option><option value="ovo">OVO</option><option value="gopay">GoPay</option></select></div>
            <button class="btn" id="createOrderBtn"><i class="fas fa-paper-plane"></i> Buat Order</button>
        </div>
    </div>

    <!-- Daftar Order -->
    <div id="ordersListPage" style="display:none;">
        <div class="form-card"><div class="form-title"><i class="fas fa-list"></i><span>Semua Order</span></div><div class="orders-table" id="allOrders"></div></div>
    </div>

    <!-- Produk -->
    <div id="productsPage" style="display:none;">
        <div class="form-card">
            <div class="form-title"><i class="fas fa-box"></i><span>Daftar Produk</span><button class="btn" id="addProductBtn" style="margin-left:auto; padding:8px 16px;"><i class="fas fa-plus"></i> Tambah Produk</button></div>
            <div class="orders-table" id="productsList"></div>
        </div>
    </div>

    <!-- Settings -->
    <div id="settingsPage" style="display:none;">
        <div class="form-card">
            <div class="form-title"><i class="fas fa-cog"></i><span>Pengaturan Panel</span></div>
            <div class="input-group"><label>API Endpoint</label><input type="text" id="apiEndpoint" placeholder="https://api.example.com"></div>
            <div class="input-group"><label>Auto Process Interval (ms)</label><input type="number" id="autoInterval" value="5000"></div>
            <button class="btn" id="saveSettingsBtn"><i class="fas fa-save"></i> Simpan Pengaturan</button>
        </div>
    </div>
</div>

<script>
    // Firebase Config (Sesuaikan dengan proyek kamu)
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_AUTH_DOMAIN",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_STORAGE_BUCKET",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    class DashboardPanel {
        constructor() {
            this.orders = [];
            this.products = [];
            this.currentUser = null;
            this.currentPage = 'dashboard';
            this.checkAuth();
        }

        async checkAuth() {
            auth.onAuthStateChanged((user) => {
                if (!user) {
                    window.location.href = 'index.html'; // Redirect ke toko jika belum login
                    return;
                }
                this.currentUser = {
                    uid: user.uid,
                    name: user.displayName || user.email.split('@')[0],
                    email: user.email
                };
                this.updateUserUI();
                this.init();
            });
        }

        updateUserUI() {
            document.getElementById('sidebarUserName').innerText = this.currentUser.name;
            document.getElementById('sidebarUserEmail').innerText = this.currentUser.email;
            document.getElementById('headerUserName').innerText = this.currentUser.name;
        }

        async init() {
            await this.loadData();
            this.setupNavigation();
            this.setupEventListeners();
            this.renderDashboard();
            this.startAutoRefresh();
        }

        async loadData() {
            // Load orders dari Firestore (atau localStorage)
            const ordersSnapshot = await db.collection('orders').where('userId', '==', this.currentUser.uid).get();
            this.orders = ordersSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            if (this.orders.length === 0) this.orders = this.getSampleOrders();

            const productsSnapshot = await db.collection('products').get();
            this.products = productsSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            if (this.products.length === 0) this.products = this.getSampleProducts();
        }

        getSampleOrders() {
            return [
                { id: 'ORD001', product: 'Diamond FF 100', target: '123456789', email: 'user@example.com', status: 'completed', amount: 25000, date: new Date().toISOString() },
                { id: 'ORD002', product: 'MLBB 500 DM', target: '987654321', email: 'player@example.com', status: 'processing', amount: 150000, date: new Date().toISOString() }
            ];
        }

        getSampleProducts() {
            return [
                { id: 'p1', name: 'Diamond FF 100', price: 25000, category: 'Free Fire' },
                { id: 'p2', name: 'Diamond FF 200', price: 48000, category: 'Free Fire' },
                { id: 'p3', name: 'MLBB 500 DM', price: 150000, category: 'Mobile Legends' }
            ];
        }

        setupNavigation() {
            document.querySelectorAll('.nav-item[data-page]').forEach(item => {
                item.addEventListener('click', () => {
                    const page = item.getAttribute('data-page');
                    this.switchPage(page);
                });
            });

            document.getElementById('logoutBtn').addEventListener('click', () => {
                auth.signOut().then(() => {
                    window.location.href = 'index.html';
                });
            });
        }

        switchPage(page) {
            this.currentPage = page;
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            document.querySelector(`.nav-item[data-page="${page}"]`).classList.add('active');

            document.querySelectorAll('#dashboardPage, #orderPage, #ordersListPage, #productsPage, #settingsPage').forEach(el => el.style.display = 'none');

            if (page === 'dashboard') {
                document.getElementById('dashboardPage').style.display = 'block';
                document.getElementById('pageTitle').innerText = 'Dashboard';
                this.renderDashboard();
            } else if (page === 'order') {
                document.getElementById('orderPage').style.display = 'block';
                document.getElementById('pageTitle').innerText = 'Buat Order';
                this.loadProductsToSelect();
            } else if (page === 'orders') {
                document.getElementById('ordersListPage').style.display = 'block';
                document.getElementById('pageTitle').innerText = 'Daftar Order';
                this.renderAllOrders();
            } else if (page === 'products') {
                document.getElementById('productsPage').style.display = 'block';
                document.getElementById('pageTitle').innerText = 'Produk';
                this.renderProducts();
            } else if (page === 'settings') {
                document.getElementById('settingsPage').style.display = 'block';
                document.getElementById('pageTitle').innerText = 'Pengaturan';
                this.loadSettings();
            }
        }

        renderDashboard() {
            const today = new Date().toDateString();
            const todayOrders = this.orders.filter(o => new Date(o.date).toDateString() === today);
            const pendingOrders = this.orders.filter(o => o.status === 'pending');
            const completedOrders = this.orders.filter(o => o.status === 'completed');
            const todayRevenue = todayOrders.reduce((sum, o) => sum + (o.amount || 0), 0);

            document.getElementById('totalOrders').innerText = todayOrders.length;
            document.getElementById('pendingOrders').innerText = pendingOrders.length;
            document.getElementById('completedOrders').innerText = completedOrders.length;
            document.getElementById('todayRevenue').innerText = `Rp ${todayRevenue.toLocaleString()}`;

            const recent = [...this.orders].reverse().slice(0, 5);
            this.renderOrderTable(recent, 'recentOrders');
        }

        renderAllOrders() {
            this.renderOrderTable([...this.orders].reverse(), 'allOrders');
        }

        renderOrderTable(orders, containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            if (orders.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:40px; color:#52525b;">Belum ada order</div>';
                return;
            }
            container.innerHTML = `
                <table>
                    <thead><tr><th>ID</th><th>Produk</th><th>Target</th><th>Status</th><th>Harga</th><th>Tanggal</th></tr></thead>
                    <tbody>
                        ${orders.map(order => `
                            <tr>
                                <td>${order.id}</td>
                                <td>${order.product}</td>
                                <td>${order.target}</td>
                                <td><span class="status status-${order.status}">${order.status}</span></td>
                                <td>Rp ${(order.amount || 0).toLocaleString()}</td>
                                <td>${new Date(order.date).toLocaleDateString()}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        renderProducts() {
            const container = document.getElementById('productsList');
            if (!container) return;
            container.innerHTML = `
                <table>
                    <thead><tr><th>ID</th><th>Nama</th><th>Harga</th><th>Kategori</th><th>Aksi</th></tr></thead>
                    <tbody>
                        ${this.products.map(p => `
                            <tr>
                                <td>${p.id}</td>
                                <td>${p.name}</td>
                                <td>Rp ${p.price.toLocaleString()}</td>
                                <td>${p.category}</td>
                                <td><button class="delete-product" data-id="${p.id}" style="background:none; color:#ef4444; border:none; cursor:pointer;"><i class="fas fa-trash"></i></button></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            document.querySelectorAll('.delete-product').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const id = btn.getAttribute('data-id');
                    if (confirm('Hapus produk ini?')) {
                        await db.collection('products').doc(id).delete();
                        this.products = this.products.filter(p => p.id !== id);
                        this.renderProducts();
                        this.loadProductsToSelect();
                    }
                });
            });
        }

        loadProductsToSelect() {
            const select = document.getElementById('productSelect');
            if (!select) return;
            select.innerHTML = '<option value="">-- Pilih Produk --</option>' +
                this.products.map(p => `<option value="${p.id}" data-price="${p.price}">${p.name} - Rp ${p.price.toLocaleString()}</option>`).join('');
        }

        setupEventListeners() {
            document.getElementById('createOrderBtn')?.addEventListener('click', () => this.createOrder());
            document.getElementById('addProductBtn')?.addEventListener('click', () => this.addProduct());
            document.getElementById('saveSettingsBtn')?.addEventListener('click', () => this.saveSettings());
        }

        async createOrder() {
            const productId = document.getElementById('productSelect').value;
            const target = document.getElementById('targetId').value.trim();
            const email = document.getElementById('customerEmail').value.trim();
            const note = document.getElementById('orderNote').value;
            const paymentMethod = document.getElementById('paymentMethod').value;

            if (!productId || !target || !email) {
                alert('Isi semua field yang diperlukan!');
                return;
            }

            const product = this.products.find(p => p.id === productId);
            if (!product) return;

            const newOrder = {
                userId: this.currentUser.uid,
                product: product.name,
                target,
                email,
                note,
                paymentMethod,
                status: 'pending',
                amount: product.price,
                date: new Date().toISOString()
            };

            const docRef = await db.collection('orders').add(newOrder);
            newOrder.id = docRef.id;
            this.orders.push(newOrder);
            alert(`Order berhasil dibuat!\nID: ${newOrder.id}\nTotal: Rp ${product.price.toLocaleString()}`);

            document.getElementById('targetId').value = '';
            document.getElementById('orderNote').value = '';
            this.renderDashboard();
        }

        async addProduct() {
            const name = prompt('Masukkan nama produk:');
            if (!name) return;
            const price = parseInt(prompt('Masukkan harga produk:'));
            if (!price) return;
            const category = prompt('Masukkan kategori:');

            const newProduct = { name, price, category: category || 'Umum' };
            const docRef = await db.collection('products').add(newProduct);
            newProduct.id = docRef.id;
            this.products.push(newProduct);
            this.renderProducts();
            this.loadProductsToSelect();
            alert('Produk berhasil ditambahkan!');
        }

        loadSettings() {
            document.getElementById('apiEndpoint').value = localStorage.getItem(`auto_api_endpoint_${this.currentUser.uid}`) || '';
            document.getElementById('autoInterval').value = localStorage.getItem(`auto_interval_${this.currentUser.uid}`) || '5000';
        }

        saveSettings() {
            localStorage.setItem(`auto_api_endpoint_${this.currentUser.uid}`, document.getElementById('apiEndpoint').value);
            localStorage.setItem(`auto_interval_${this.currentUser.uid}`, document.getElementById('autoInterval').value);
            alert('Pengaturan disimpan!');
        }

        startAutoRefresh() {
            setInterval(() => {
                if (this.currentPage === 'dashboard') this.renderDashboard();
                else if (this.currentPage === 'orders') this.renderAllOrders();
            }, 10000);
        }
    }

    new DashboardPanel();
</script>
</body>
</html>
